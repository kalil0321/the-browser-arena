name: Monitor and Update Packages

on:
  schedule:
    # Run every Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  monitor-packages:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Check for updates
        id: check
        run: |
          updates=""
          needs_update=false

          # Check notte-sdk
          current_notte=$(grep -o 'notte-sdk>=[0-9.]*' agents/pyproject.toml | sed 's/notte-sdk>=//')
          latest_notte=$(curl -s https://pypi.org/pypi/notte-sdk/json | jq -r '.info.version')
          echo "notte-sdk: $current_notte -> $latest_notte"
          if [ "$current_notte" != "$latest_notte" ]; then
            updates="${updates}- notte-sdk: ${current_notte} -> ${latest_notte}\n"
            needs_update=true
          fi

          # Check stagehand (root)
          current_sh_root=$(node -e "console.log(require('./package.json').dependencies['@browserbasehq/stagehand'].replace('^',''))" 2>/dev/null || echo "unknown")
          latest_sh=$(npm view @browserbasehq/stagehand version)
          echo "stagehand (root): $current_sh_root -> $latest_sh"
          if [ "$current_sh_root" != "$latest_sh" ]; then
            updates="${updates}- @browserbasehq/stagehand (root): ${current_sh_root} -> ${latest_sh}\n"
            needs_update=true
          fi

          # Check stagehand (stagehand folder)
          current_sh_folder=$(node -e "console.log(require('./stagehand/package.json').dependencies['@browserbasehq/stagehand'].replace('^',''))" 2>/dev/null || echo "unknown")
          echo "stagehand (stagehand/): $current_sh_folder -> $latest_sh"
          if [ "$current_sh_folder" != "$latest_sh" ]; then
            updates="${updates}- @browserbasehq/stagehand (stagehand/): ${current_sh_folder} -> ${latest_sh}\n"
            needs_update=true
          fi

          # browser-use tracks git main — always refresh lock
          needs_update=true
          updates="${updates}- browser-use: updated to latest main\n"

          echo "needs_update=$needs_update" >> $GITHUB_OUTPUT
          {
            echo "updates<<UPDATES_EOF"
            echo -e "$updates"
            echo "UPDATES_EOF"
          } >> $GITHUB_OUTPUT

      - name: Update packages and create PR
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          UPDATES: ${{ steps.check.outputs.updates }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          branch_name="auto/update-packages-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$branch_name"

          # Update notte-sdk version in pyproject.toml
          latest_notte=$(curl -s https://pypi.org/pypi/notte-sdk/json | jq -r '.info.version')
          sed -i "s/notte-sdk>=[0-9.]*/notte-sdk>=$latest_notte/" agents/pyproject.toml

          # Update uv.lock (also picks up latest browser-use from main)
          cd agents && uv lock --upgrade && cd ..

          # Update stagehand in both locations
          latest_sh=$(npm view @browserbasehq/stagehand version)
          npm install "@browserbasehq/stagehand@$latest_sh"
          cd stagehand && npm install "@browserbasehq/stagehand@$latest_sh" && cd ..

          # Commit and push
          git add -A
          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore: update packages (browser-use, notte-sdk, stagehand)

          $UPDATES
          Auto-generated by GitHub Actions"

          git push origin "$branch_name"

          # Create PR using gh CLI
          gh pr create \
            --title "chore: update packages (browser-use, notte-sdk, stagehand)" \
            --body "## Package Updates

          $UPDATES
          ### Files changed
          - agents/pyproject.toml & agents/uv.lock — Python deps
          - package.json & package-lock.json — npm deps (root)
          - stagehand/package.json & stagehand/package-lock.json — npm deps (stagehand)

          ---
          *Auto-generated by the update-packages workflow*"

      - name: Summary
        env:
          NEEDS_UPDATE: ${{ steps.check.outputs.needs_update }}
        run: |
          if [ "$NEEDS_UPDATE" == "true" ]; then
            echo "### Package updates found — PR created (if changes existed)" >> $GITHUB_STEP_SUMMARY
          else
            echo "### All packages are up to date" >> $GITHUB_STEP_SUMMARY
          fi
